<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم الإرسال — Manasety</title>
<link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;500;600;700;800&family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<meta http-equiv="refresh" content="5;url=index.html">
<style>
:root {
  --navy: #0C2461;
  --blue: #1849A9;
  --cyan: #078FD2;
  --orange: #F97316;
  --ar: 'Baloo Bhaijaan 2', cursive, sans-serif;
  --en: 'Nunito', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: linear-gradient(160deg, #0a1628 0%, #0C2461 40%, #1849A9 100%);
  color: #fff;
  font-family: var(--ar);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}
.container {
  animation: fadeUp .8s cubic-bezier(.16,1,.3,1) both;
}
.check-circle {
  width: 100px; height: 100px;
  border-radius: 50%;
  background: linear-gradient(135deg, #16A34A, #22C55E);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 28px;
  box-shadow: 0 8px 32px rgba(22,163,74,.35);
  animation: scaleIn .6s cubic-bezier(.16,1,.3,1) .2s both;
}
.check-circle svg {
  width: 48px; height: 48px;
  stroke: #fff; stroke-width: 3;
  fill: none; stroke-linecap: round; stroke-linejoin: round;
  stroke-dasharray: 60;
  stroke-dashoffset: 60;
  animation: drawCheck .5s ease .6s forwards;
}
h1 {
  font-size: 36px; font-weight: 800;
  margin-bottom: 12px;
}
p {
  font-size: 18px;
  color: rgba(255,255,255,.7);
  margin-bottom: 8px;
  line-height: 1.8;
}
.countdown {
  font-family: var(--en);
  font-size: 14px;
  color: rgba(255,255,255,.4);
  margin-top: 24px;
}
.countdown span {
  color: var(--orange);
  font-weight: 700;
  font-size: 18px;
}
.manual-link {
  display: inline-block;
  margin-top: 16px;
  color: var(--cyan);
  text-decoration: none;
  font-weight: 700;
  font-size: 15px;
  transition: color .3s;
}
.manual-link:hover { color: var(--orange); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(.5); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes drawCheck {
  to { stroke-dashoffset: 0; }
}
</style>
</head>
<body>
<div class="container">
  <div class="check-circle">
    <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>
  </div>
  <h1>تم إرسال طلبك بنجاح!</h1>
  <p>شكراً لتواصلك معنا، فريق Manasety سيتواصل معك قريباً.</p>
  <div class="countdown">سيتم تحويلك للصفحة الرئيسية خلال <span id="timer">5</span> ثوانٍ</div>
  <a href="index.html" class="manual-link">العودة للصفحة الرئيسية ←</a>
</div>
<script>
let s = 5;
const t = document.getElementById('timer');
setInterval(() => { if(s > 0) t.textContent = --s; }, 1000);
</script>
</body>
</html>
